<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 486" font-family="'Cascadia Code','Consolas','SF Mono',monospace" font-size="14">
  <style>
    text{white-space:pre}
    .b{fill:#569cd6}.y{fill:#dcdcaa}.g{fill:#4ec9b0}.d{fill:#6a737d}.w{fill:#d4d4d4}
  </style>
  <rect x="0" y="0" width="900" height="486" rx="10" fill="#1e1e1e"/>
  <rect x="0" y="0" width="900" height="30" rx="10" fill="#323233"/>
  <rect x="0" y="20" width="900" height="10" fill="#323233"/>
  <circle cx="20" cy="15" r="6" fill="#ff5f56"/><circle cx="40" cy="15" r="6" fill="#ffbd2e"/><circle cx="60" cy="15" r="6" fill="#27c93f"/>
  <text x="450" y="20" text-anchor="middle" class="d">tidysync</text>
  <g transform="translate(20,0)">
    <text x="0" y="58"><tspan class="g">PS D:\OneDrive-GDrive-2waySync&gt;</tspan><tspan class="w"> tidysync</tspan></text>
    <text x="0" y="92"  class="b">================ TidySync : Google Drive &lt;-&gt; OneDrive ================</text>
    <text x="0" y="114" class="y">  SYNC</text>
    <text x="0" y="136" class="w">    1) Run a sync pair        copy recent changes between two clouds</text>
    <text x="0" y="158" class="w">    2) Run all pairs          run every configured pair</text>
    <text x="0" y="180" class="y">  MAINTAIN  (one cloud at a time)</text>
    <text x="0" y="202" class="w">    3) Find duplicates        by content; move extras to a review folder</text>
    <text x="0" y="224" class="w">    4) Convert Google docs    make .docx/.xlsx/.pptx copies on Google Drive</text>
    <text x="0" y="246" class="y">  SETUP</text>
    <text x="0" y="268" class="w">    5) Configure a pair       clouds, direction, folders, time window</text>
    <text x="0" y="290" class="w">    6) Schedule a pair        7) Unschedule a pair</text>
    <text x="0" y="312" class="w">    8) Status                 9) Check remotes</text>
    <text x="0" y="334" class="w">   10) Create / repair config</text>
    <text x="0" y="356" class="d">  ---------------------------------------------------------------------</text>
    <text x="0" y="378" class="w">    h) Help (what each option does)                 0) Quit</text>
    <text x="0" y="400" class="b">=====================================================================</text>
    <text x="0" y="434" class="w">Select: <tspan fill="#1e1e1e" style="filter:none"></tspan></text>
    <rect x="76" y="423" width="9" height="16" fill="#d4d4d4"/>
  </g>
</svg>
